<ion-content>
  <div class="root">

    <!-- Atmospheric court lines -->
    <div class="court-bg" aria-hidden="true">
      <div class="court-bounds"></div>
      <div class="court-net"></div>
      <div class="court-attack court-attack--near"></div>
      <div class="court-attack court-attack--far"></div>
      <div class="court-glow"></div>
    </div>

    <div class="login-wrap">

      <!-- Brand block -->
      <header class="brand-block">
        <span class="wordmark">SPIKE</span>
        <span class="wordmark-sub">Volleyball Match Tracker</span>
      </header>

      <!-- Auth card -->
      <div class="auth-card">

        <!-- Sign in / Create account toggle -->
        <div class="mode-bar" role="tablist" aria-label="Authentication mode">
          <button
            class="mode-btn"
            [class.mode-btn--active]="mode === 'signin'"
            role="tab"
            [attr.aria-selected]="mode === 'signin'"
            (click)="setMode('signin')"
          >Sign In</button>
          <button
            class="mode-btn"
            [class.mode-btn--active]="mode === 'signup'"
            role="tab"
            [attr.aria-selected]="mode === 'signup'"
            (click)="setMode('signup')"
          >Create Account</button>
        </div>

        <!-- Google -->
        <button
          type="button"
          class="btn-google"
          (click)="continueWithGoogle()"
          [disabled]="isLoading"
        >
          <svg class="goog-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-label">or with email</span>
          <span class="divider-line"></span>
        </div>

        <!-- Email / password form -->
        <form class="form" (ngSubmit)="submitEmail()" novalidate>
          <div class="field">
            <label class="field-label" for="login-email">Email</label>
            <input
              id="login-email"
              class="field-input"
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="you@example.com"
              autocomplete="email"
              autocapitalize="none"
              [attr.aria-invalid]="error ? 'true' : null"
              required
            />
          </div>

          <div class="field">
            <label class="field-label" for="login-pw">Password</label>
            <div class="field-pw-wrap">
              <input
                id="login-pw"
                class="field-input field-input--pw"
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                [(ngModel)]="password"
                placeholder="••••••••"
                [attr.autocomplete]="mode === 'signup' ? 'new-password' : 'current-password'"
                [attr.aria-invalid]="error ? 'true' : null"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                (click)="togglePassword()"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              >{{ showPassword ? 'Hide' : 'Show' }}</button>
            </div>
          </div>

          @if (error) {
            <p class="form-error" role="alert">{{ error }}</p>
          }

          <button
            type="submit"
            class="btn-primary"
            [disabled]="isLoading"
          >
            @if (isLoading) {
              <span class="spinner" aria-hidden="true"></span>
            } @else {
              {{ mode === 'signin' ? 'Sign In' : 'Create Account' }}
            }
          </button>
        </form>

      </div>
    </div>
  </div>
</ion-content>
